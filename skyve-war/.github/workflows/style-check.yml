name: Code Style Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-style:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write

    steps:
    - name: Setup Maven Action
      uses: s4u/setup-maven-action@4f7fb9d9675e899ca81c6161dadbba0189a4ebb1 # v1.18.0
      with:
        java-version: 17
        java-distribution: adopt
        maven-version: 3.9.7
        checkout-fetch-depth: 0
        settings-servers: |
          [{
            "id": "skyve",
            "username": "${{ secrets.NEXUSUSERNAME }}",
            "password": "${{ secrets.NEXUSPASSWORD }}"
          }]
    - name: Spotless Check
      id: spotless
      run: mvn -B validate spotless:check
      continue-on-error: true
    - name: Add PR comment
      if: steps.spotless.outcome == 'failure'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      with:
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: "Spotless check failed; please run `mvn spotless:apply` to fix formatting issues."
          })
    - name: Fail the workflow
      if: steps.spotless.outcome == 'failure'
      run: exit 1
