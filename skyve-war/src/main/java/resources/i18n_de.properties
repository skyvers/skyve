admin.documentCreator.help.blurb1                                               = <div style="margin-top: 0px" class="ui-messages ui-widget" aria-live="polite">\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<div class="ui-messages-info ui-corner-all">\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<span class="ui-messages-warn-icon"></span>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li role="alert" aria-atomic="true">\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<span class="ui-messages-warn-detail">\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009Der Skyve Script Document Creator ist ein Entwickler-Tool zur Unterstützung der schnellen Entwicklung,\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009mit dem Projektdateien bearbeitet werden können.<br> \n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009&emsp;Stellen Sie sicher, dass Ihr Projekt unter Versionskontrolle steht, um es vor unerwarteten Änderungen zu schützen.\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</span>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</li>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009</div>\n\u0009\u0009\u0009\u0009\u0009\u0009</div>\u0009\u0009\u0009\u0009\n\u0009\u0009\u0009\u0009\u0009\n\u0009\u0009\u0009\u0009\u0009\u0009<h2>Skyve Script Hilfe</h2>\n\u0009\u0009\u0009\u0009\u0009\u0009<span style="font-size: 1.1rem">\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<p>Skyve Script nutzt Markdown, damit Entwickler Domänenmodelle in einem nicht-technischen Format definieren können. \n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009Wenn Sie Ihr Markdown in die Registerkarte <em>Eingabe</em> einfügen, <br\>zeigt das System eine Vorschau des Markdown an und\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009das generierte Dokument, wenn Sie die Registerkarte wechseln. Eventuelle Fehler sollten rot markiert sein in dem<em>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009Dokumentvorschau</em> Tab.</p>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<p>Mit dem Document Creator können Sie Quelldateien direkt in Ihrem Projekt erstellen,\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009Sie sollten dies jedoch nur versuchen, wenn Ihr Projekt unter Quellcodeverwaltung steht, um sicherzustellen, <br\>dass Sie \n\u0009\u0009\u0009\u0009\u0009\u0009\u0009unerwartete oder teilweise Änderungen rückgängig machen können. Ihre Projektdatei <code>.json</code> enthält die \n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<code>moduleDirectory</code> Einstellung für den absoluten Dateipfad Ihres Quellverzeichnisses <br\>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009und der Document Creator verwendet diesen Speicherort, sofern er angegeben wurde. </p>\u0009\u0009\u0009\u0009\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<p>Skyve Script stellt bei der Generierung von Domänenmodellen einige spezifische Anforderungen an die Syntax:</p>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Neue Module sollten mit einer Überschrift der Ebene 1 (#) angegeben werden, gefolgt von einem Leerzeichen und dem Modulnamen in TitleCase\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>z.B. <code># addressbook</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Wenn ein bestimmter Modultitel angegeben werden muss, kann dieser in einfache oder doppelte Anführungszeichen gesetzt werden, z. B. <code># 'Address Book'</code><br\>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Neue Domänenmodelle (Dokumente) sollten mit einer Überschrift der Ebene 2 (##) angegeben werden, gefolgt von einem Leerzeichen und dem Dokumentnamen in TitleCase\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>z.B. <code>## Address</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Wenn ein bestimmter Dokumenttitel angegeben werden muss, kann dieser in einfache oder doppelte Anführungszeichen gesetzt werden, z. B. <code>## 'My Address'</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Wenn das Dokument dauerhaft gespeichert werden soll, sollte der persistente Name direkt auf den Dokumentnamen folgen und von Backticks (`) umgeben sein, z. B. <code>## User `ADR_Address`</code><br\>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Domänenattribute (Felder) sollten als Liste unterhalb der Domänenüberschrift angegeben werden, wobei ein Bindestrich (-) gefolgt von einem Leerzeichen und anschließend der Attributdefinition verwendet wird\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Attributdefinitionen sollten mit dem Attributnamen in CamelCase beginnen (keine Leerzeichen, erster Buchstabe klein, neue Wörter großgeschrieben), z. B. <code>firstName</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Die Namen der erforderlichen Attribute sollten von Sternchen umgeben sein, z. B. <code>- *firstName*</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Der Typ sollte auf den Attributnamen folgen\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Wenn der Typ Text ist, sollte die Länge dem Typ folgen, z. B.<code>- *firstName* text 150</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Wenn es sich um einen Enum-Typ handelt, sollten die Werte in Klammern hinter dem Typ stehen, z. B. <code>- state enum ('Not Started', 'In Progress', Complete)</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Wenn ein bestimmter Anzeigename erforderlich ist, kann dieser in einfache oder doppelte Anführungszeichen gesetzt werden, z. B. <code>- 'State or Province'</code><br\>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Associations sollten als Listenelement angegeben werden, indem ein Bindestrich (-) gefolgt von einem Leerzeichen, dem Namen der Association in CamelCase und dem Association Dokument in TitleCase <br\>verwendet wird\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>e.g. <code>- country Country</code> (vorausgesetzt, es ist im Skript ein Country Dokument angegeben oder bereits in einem anderen Modul vorhanden)\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Erforderliche Associations sollten mit Sternchen umgeben sein, z. B. <code>- *country* Country</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Der Association Typ kann durch Backticks hinter dem Dokumentnamen angegeben werden, z. B. <code>- country Country `composition`</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Das zugehörige Dokument für die Association kann die Punktnotation verwenden, um ein Dokument aus einem anderen Modul anzugeben, z. B. <code>- country general.Country</code><br\>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Collections sollten als Listenelement angegeben werden, indem man ein Pluszeichen (+) verwendet, gefolgt von einem Leerzeichen, dann dem Namen der Collections in CamelCase und schließlich <br\>dem Collections Dokument in TitleCase\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>z.B. <code>+ roles Role</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Der Name von erforderlichen Collections sollte von Sternchen umgeben sein, z. B. <code>+ *roles* Role</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Der Collection Ttyp kann in Backticks hinter dem Dokumentnamen angegeben werden, z. B. <code>+ roles Role `child`</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Das zugehörige Dokument der Collection kann mithilfe der Punktnotation ein Dokument aus einem anderen Modul angeben, z. B. <code>+ users admin.User</code>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<p>Eine vollständige Modulspezifikation würde dann wie folgt aussehen:</p>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<pre>\n# 'Address Book'<br>\n<br>\n## Address `ADR_Address`<br>\n- addressType enum (Business,Postal,Home,Other)<br>\n- *addressLine1* text 100<br>\n- addressLine2 text 100<br>\n- addressLine3 text 100<br>\n- suburb text 50<br>\n- city text 200<br>\n- postalCode text 10<br>\n- state text 50<br>\n- *country* Country<br>\n- boundary geometry<br>\n- verified boolean<br>\n<br>\n## Country `ADR_Country`<br>\n- *name* text 100<br>\n- flag content<br>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009</pre>\n\u0009\u0009\u0009\u0009\u0009\u0009<p>Sobald Ihre Dateien erstellt sind:</p>\n\u0009\u0009\u0009\u0009\u0009\u0009<ul>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Fügen Sie das neue Modul in Ihre <code>customer.xml</code> Datei ein</li>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Verwenden Sie das maven target [Generate Domain], um das Modul als Teil Ihres Projekts zu erstellen</li>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Fügen Sie Ihrem Benutzer nach der Bereitstellung die entsprechenden Berechtigungen hinzu, damit er das neue Modul nutzen kann</li>\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<li>Melden Sie sich ab und wieder an, damit die neuen Zugriffsrechte wirksam werden.</li>\n\u0009\u0009\u0009\u0009\u0009\u0009</ul>\n\u0009\u0009\u0009\u0009\u0009\u0009</span>\n\u0009\u0009\u0009\u0009\u0009
