<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:ui="http://java.sun.com/jsf/facelets"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:p="http://primefaces.org/ui"
		xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
		lang="#{_skyveMarkup.languageTag}" xml:lang="#{_skyveMarkup.languageTag}"
		dir="#{_skyveMarkup.dir}">
	<f:view contentType="text/html" encoding="#{_skyveMarkup.encoding}">
		<f:metadata>
			<f:viewParam name="_id" value="#{_skyveMarkup.contentIdParameter}" />
			<f:viewParam name="_n" value="#{_skyveMarkup.contentBindingParameter}" />
			<f:viewParam name="_b" value="#{_skyveMarkup.bindingParameter}" />
			<f:viewParam name="_c" value="#{_skyveMarkup.contextParameter}" />
			<f:event type="preRenderView" listener="#{_skyveMarkup.preRender}" />
		</f:metadata>
		<ui:composition template="/WEB-INF/pages/templates/iframe/template.xhtml">
			<ui:param name="bean" value="#{_skyveMarkup}" />
			<ui:define name="templateTitle">#{_skyveMarkup.i18n['page.contentUpload.title']}</ui:define>
			<ui:define name="templateHead">
				<!-- Disable browser-level pinch zoom so Excalidraw's own touch gesture handler
					 takes full control of canvas zoom and pan on mobile devices. -->
				<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
				<link type="text/css" rel="stylesheet"
						href="skyve/css/image-markup-min.css?v=#{_skyveMarkup.webResourceFileVersion}" />
			</ui:define>
			<ui:define name="templateBody">
				<p:staticMessage severity="error"
									summary="You cannot access this function"
									detail="Click &lt;a href=&quot;javascript:void(0)&quot; onclick=&quot;window.top.location=''&quot;&gt;here&lt;/a&gt;"
									rendered="#{not _skyveMarkup.canAccess}"
									escape="false"
									styleClass="skyve-markup-access-message" />
				<!-- The image markup script prevents form submission so Excalidraw's internal toolbar elements
					 (stroke, sloppiness, etc.) cannot trigger a full-page JSF postback. The p:commandButton for Apply
					 is triggered programmatically and continues to use PrimeFaces AJAX. -->
				<h:form id="form" prependId="false" rendered="#{_skyveMarkup.canAccess}">
					<h:inputHidden id="svg" value="#{_skyveMarkup.svg}" />
					<h:inputHidden id="_c" value="#{_skyveMarkup.contextParameter}" />
					<h:inputHidden id="_b" value="#{_skyveMarkup.bindingParameter}" />
					<h:inputHidden id="_n" value="#{_skyveMarkup.contentBindingParameter}" />
					<p:growl id="messages" showDetail="true" escape="false" />
					<div id="excalidraw-wrapper">
						<h:panelGroup id="excalidraw-root" layout="block"
								pt:data-image-width="#{_skyveMarkup.imageWidth}"
								pt:data-image-height="#{_skyveMarkup.imageHeight}"
								pt:data-background-url="#{_skyveMarkup.backgroundUrl}"
								pt:data-forced-dark="#{_skyveTheme.forcedDark}"
								pt:data-smart-client="#{_skyveTheme.smartClient}" />
					</div>
					<!-- Visible Apply button: captures Excalidraw SVG asynchronously then triggers server action -->
					<button id="markupApply" type="button" class="skyve-markup-apply">
						<span class="fa-solid fa-pencil"></span> Apply
					</button>
					<!-- Hidden PrimeFaces action button triggered programmatically after SVG is ready -->
					<p:commandButton id="applySvgAction"
										styleClass="skyve-markup-hidden-action"
										action="#{_skyveMarkup.apply}"
										update="@none" />
				</h:form>
			</ui:define>
			<ui:define name="templateBodyScripts">
				<!-- Excalidraw 0.17.6 (MIT) vendored — React 18.3.1 (MIT) -->
				<script>window.EXCALIDRAW_ASSET_PATH = '#{_skyveMarkup.baseHref}excalidraw/';</script>
				<script src="excalidraw/react.production.min.js"></script>
				<script src="excalidraw/react-dom.production.min.js"></script>
				<script src="excalidraw/excalidraw.production.min.js"></script>
				<script type="text/javascript" src="skyve/prime/image-markup-min.js?v=#{_skyveMarkup.webResourceFileVersion}"></script>
			</ui:define>
		</ui:composition>
	</f:view>
</html>
