<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui" 
	xmlns:s="http://skyve.org/xml/ui"
	dir="#{changePassword.dir}">
<f:view contentType="text/html" encoding="UTF-8">
	<f:metadata>
		<f:viewParam name="a" value="#{changePassword.webActionParameter}" />
		<f:viewParam name="m" value="#{changePassword.bizModuleParameter}" />
		<f:viewParam name="d" value="#{changePassword.bizDocumentParameter}" />
		<f:viewParam name="q" value="#{changePassword.queryNameParameter}" />
		<f:viewParam name="i" value="#{changePassword.bizIdParameter}" />
		<f:viewParam name="b" value="#{changePassword.bindingParameter}" />
		<f:event type="preRenderView" listener="#{changePassword.preRender}" />
	</f:metadata>
	<p:importEnum type="org.skyve.web.WebAction" var="WebAction" allSuffix="ALL_ENUM_VALUES" />
	<p:importEnum type="org.skyve.web.UserAgentType" var="UserAgentType" allSuffix="ALL_ENUM_VALUES" />
	<ui:composition template="/WEB-INF/pages/templates/#{changePassword.templateName}/view.xhtml">
		<ui:param name="bean" value="#{changePassword}" />
		<ui:param name="showMenu" value="true" />
		<ui:param name="resetMenu" value="false" />
		<ui:param name="showSwitchMode" value="#{'phone' ne changePassword.userAgentType}" />
		<ui:param name="showLogout" value="true" />
		
		<ui:define name="head">
			<style type="text/css">
				.progress-bar-danger .ui-progressbar-value {
				    background-color: #d9534f !important; /* Red */
				}
				
				.progress-bar-warning .ui-progressbar-value {
				    background-color: #f0ad4e !important; /* Orange */
				}
				
				.progress-bar-info .ui-progressbar-value {
				    background-color: #5bc0de !important; /* Blue */
				}
				
				.progress-bar-success .ui-progressbar-value {
				    background-color: #5cb85c !important; /* Green */
				}
			</style>
		</ui:define>
		
		<ui:define name="body">
			<s:conversation managedBean="changePassword" />
			<s:csrfForm managedBean="changePassword">
				<ui:include src="/WEB-INF/pages/includes/formFocusAndPush.xhtml">
					<ui:param name="bean" value="#{changePassword}" />
				</ui:include>
					
				<div class="ui-g">
					<!-- Part 1 -->
					<s:view module="#{changePassword.bizModuleParameter}"
						document="#{changePassword.bizDocumentParameter}"
						managedBean="changePassword" update="@form"
						widgetId="widPart1" childStyleClass="ui-g-12" />
				
		            <div style="display: flex; justify-content: flex-end; width: 100%;">
		                <p:outputPanel id="strengthBar" style="padding-right: 45px;">
		                	<!-- Strength Indicator -->
				            <div style="white-space:nowrap;">
							    <h:outputText value="Password strength "/>
							    <h:outputText id="pwdWeak" value="weak" style="display:none" styleClass="bold weakMsg"/>
							    <h:outputText id="pwdMedium" value="medium" style="display:none" styleClass="bold mediumMsg"/>
							    <h:outputText id="pwdStrong" value="strong" style="display:none" styleClass="bold strongMsg"/>
							</div>
		                    <p:progressBar value="#{changePassword.strengthScore * 25}" 
		                                   styleClass="#{changePassword.strengthClass}" 
		                                   displayOnly="true" 
		                                   style="width:425px;"/>
		                </p:outputPanel>
		            </div>
            
					<!-- Part 2 -->
					<s:view module="#{changePassword.bizModuleParameter}"
						document="#{changePassword.bizDocumentParameter}"
						managedBean="changePassword" update=":strengthBar"
						widgetId="widPart2" childStyleClass="ui-g-12" />
				</div>
				
			</s:csrfForm>
		</ui:define>
	</ui:composition>
</f:view>
</html>
